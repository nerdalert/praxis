# Container Default Configuration
#
# Default config for containerized deployments. Binds
# to all interfaces so health checks and traffic are
# reachable from outside the container's network
# namespace.
#
# Usage:
#   docker run -p 8080:8080 praxis:0.1.0
#   curl http://localhost:8080/

admin:
  address: "0.0.0.0:9901"

insecure_options:
  allow_public_admin: true

listeners:
  - name: default
    address: "0.0.0.0:8080"
    filter_chains:
      - default-response

filter_chains:
  - name: default-response
    filters:
      - filter: static_response
        status: 200
        headers:
          - name: Content-Type
            value: application/json
        body: '{"status": "ok", "server": "praxis"}'
        conditions:
          - when:
              path: "/"

      - filter: static_response
        status: 404
        headers:
          - name: Content-Type
            value: application/json
        body: '{"error": "not found"}'
