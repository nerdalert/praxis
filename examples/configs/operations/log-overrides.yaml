# Per-Module Log Level Overrides
#
# Use `runtime.log_overrides` to raise or lower
# log verbosity for specific modules without
# flooding output from every subsystem.
#
# Module paths follow Rust crate::module syntax.
# Set RUST_LOG=info as the baseline, then override
# individual modules below.
#
# Usage:
#   RUST_LOG=info cargo run -p praxis -- \
#     -c examples/configs/operations/log-overrides.yaml
#   curl http://localhost:8080/

runtime:
  log_overrides:
    praxis_filter::pipeline: trace
    praxis_protocol: debug

listeners:
  - name: default
    address: "127.0.0.1:8080"
    filter_chains:
      - main

filter_chains:
  - name: main
    filters:
      - filter: static_response
        status: 200
        headers:
          - name: Content-Type
            value: application/json
        body: '{"status": "ok"}'
