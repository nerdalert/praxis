# IP Access Control List (ACL)
#
# Allow or deny requests by source IP/CIDR. When `allow` is set,
# only matching IPs are permitted. `allow` takes precedence over
# `deny`. Both IPv4 and IPv6 CIDR ranges are supported.
#
# Usage:
#   cargo run -p praxis -- -c examples/configs/security/ip-acl.yaml
#
# Exercise:
#   curl http://localhost:8080/      # allowed (loopback)
#   curl http://localhost:8080/admin # allowed (loopback)

listeners:
  - name: default
    address: "127.0.0.1:8080"
    filter_chains:
      - main

filter_chains:
  - name: main
    filters:
      - filter: ip_acl
        allow: # demo allowlist; restrict to your CIDRs
          # IPv4 loopback
          - "127.0.0.0/8"
          # IPv4 ranges
          - "10.0.0.0/8"
          # IPv6 loopback
          - "::1/128"
          # IPv6 Unique Local Address (ULA) range
          - "fd00::/8"
          # IPv6 documentation prefix (RFC 3849)
          - "2001:db8::/32"
        deny:
          # IPv4 catch-all
          - "0.0.0.0/0"
          # IPv6 catch-all
          - "::/0"

      - filter: router
        routes:
          - path_prefix: "/"
            cluster: backend

      - filter: load_balancer
        clusters:
          - name: backend
            endpoints:
              - "127.0.0.1:3000"
