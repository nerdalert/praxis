# TCP Timeouts
#
# TCP proxy with idle and max duration timeouts.
# `tcp_idle_timeout_ms` closes connections that have
# been idle (no data in either direction) longer than
# the threshold. `tcp_max_duration_secs` caps the total
# session duration regardless of activity.
#
# Both are optional. Without them, TCP sessions run
# until either side closes the connection.
#
#   Client -> TCP -> Praxis :5432 -> TCP -> PostgreSQL :15432
#
# Usage:
#   cargo run -p praxis -- -c examples/configs/protocols/tcp-timeouts.yaml

listeners:
  - name: postgres
    address: "127.0.0.1:5432"
    protocol: tcp
    upstream: "127.0.0.1:15432"
    tcp_idle_timeout_ms: 300000 # 5 minutes
    tcp_max_duration_secs: 3600 # 1 hour
