# Listener mTLS (Client Certificate Required)
#
# The proxy requires clients to present a valid TLS
# certificate signed by the trusted CA. Connections
# without a client cert are rejected at the TLS layer.
#
#   Client -> mTLS -> Praxis :8443 -> HTTP -> Backend :3000
#
# Usage:
#   cargo run -p praxis -- -c examples/configs/protocols/tls-mtls-listener.yaml
#   curl --cert client.pem --key client-key.pem \
#        --cacert ca.pem https://localhost:8443/

listeners:
  - name: secure
    address: "127.0.0.1:8443"
    filter_chains:
      - main
    tls:
      certificates:
        - cert_path: /etc/ssl/certs/server.pem
          key_path: /etc/ssl/private/server-key.pem
      client_ca:
        ca_path: /etc/ssl/certs/client-ca.pem
      client_cert_mode: require

filter_chains:
  - name: main
    filters:
      - filter: router
        routes:
          - path_prefix: "/"
            cluster: backend

      - filter: load_balancer
        clusters:
          - name: backend
            endpoints:
              - "127.0.0.1:3000"
