# Upstream TLS with Verification Disabled
#
# Plain HTTP listener; TLS to the upstream with certificate
# verification disabled. Use ONLY in development and testing
# environments with self-signed certificates.
#
#   Client -> HTTP -> Praxis :8080 -> TLS (no verify) -> Backend :8443
#
# Usage:
#   cargo run -p praxis -- -c examples/configs/protocols/tls-verify-disabled.yaml
#   curl http://localhost:8080/

listeners:
  - name: default
    address: "127.0.0.1:8080"
    filter_chains:
      - main

filter_chains:
  - name: main
    filters:
      - filter: router
        routes:
          - path_prefix: "/"
            cluster: backend

      - filter: load_balancer
        clusters:
          - name: backend
            tls:
              # SECURITY: verification disabled for self-signed certs.
              # Do not use in production.
              verify: false
            endpoints:
              - "127.0.0.1:8443"
