# Global Upstream CA File
#
# Sets a trusted CA bundle for all upstream TLS
# connections via `runtime.upstream_ca_file`. Clusters
# with `tls:` enabled will verify the upstream
# certificate against this CA instead of the system
# trust store.
#
# Use per-cluster `tls.ca.ca_path` instead when
# different clusters trust different CAs.
#
# Note: upstream_ca_file replaces the system trust
# store entirely. Create a combined PEM bundle if you
# need both private and public CAs.
#
# The path is validated at startup, so to use this
# feature add the following to this config (adjusting
# the path to your CA bundle):
#
#   runtime:
#     upstream_ca_file: /etc/praxis/tls/ca-bundle.pem
#
#   Client -> HTTP -> Praxis :8080 -> TLS -> Backend :8443
#
# Usage:
#   cargo run -p praxis -- -c examples/configs/protocols/upstream-ca-file.yaml
#   curl http://localhost:8080/

listeners:
  - name: default
    address: "127.0.0.1:8080"
    filter_chains:
      - main

filter_chains:
  - name: main
    filters:
      - filter: router
        routes:
          - path_prefix: "/"
            cluster: backend

      - filter: load_balancer
        clusters:
          - name: backend
            tls:
              sni: "api.example.com"
            endpoints:
              - "127.0.0.1:8443"
