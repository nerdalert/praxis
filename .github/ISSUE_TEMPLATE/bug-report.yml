name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "triage/needs-triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to trigger the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
  - type: input
    id: version
    attributes:
      label: Praxis Version
      placeholder: "v0.4.0"
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - AI / Inference
        - Core / Config
        - Filter Pipeline
        - Observability
        - Protocol
        - Security / TLS
        - Traffic Management
        - Transformation
        - Other
