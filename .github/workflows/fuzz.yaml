name: Fuzz

# ------------------------------------------------------------------------------
# Workflow Settings
# ------------------------------------------------------------------------------

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:
    inputs:
      duration:
        description: "Fuzz duration per target in seconds"
        required: false
        type: number
        default: 120

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  FUZZ_DURATION: ${{ github.event_name == 'schedule' && '1800' || inputs.duration || '120' }}

jobs:
  # -----------------------------------------------------------------
  # Fuzz
  # -----------------------------------------------------------------

  fuzz:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install nightly Rust
        uses: ./.github/actions/install-nightly-rust

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Run fuzz targets
        run: make fuzz
