name: Fuzz

# ------------------------------------------------------------------------------
# Workflow Settings
# ------------------------------------------------------------------------------

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:
    inputs:
      duration:
        description: "Fuzz duration per target in seconds"
        required: false
        type: number
        default: 120

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  FUZZ_DURATION: ${{ github.event_name == 'schedule' && '1800' || inputs.duration || '120' }}

jobs:
  # -----------------------------------------------------------------
  # Fuzz
  # -----------------------------------------------------------------

  fuzz:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly-2026-03-28 (rustc 1.96.0)

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Run fuzz targets
        run: make fuzz
