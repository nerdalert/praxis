changelog:
  categories:
    - title: "Breaking Changes"
      labels: ["breaking"]
    - title: "Features"
      labels: ["enhancement"]
    - title: "Bug Fixes"
      labels: ["bug"]
    - title: "Documentation"
      labels: ["documentation"]
    - title: "Dependencies"
      labels: ["dependencies"]
    - title: "Other"
      labels: ["*"]
  exclude:
    labels: ["skip/changelog"]
